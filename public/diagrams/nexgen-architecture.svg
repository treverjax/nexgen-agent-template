<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 580">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <marker id="arrowWhite" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffffff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F38020"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="950" height="580" fill="url(#bgGradient)"/>
  
  <!-- ==================== MAIN CLOUDFLARE CONTAINER ==================== -->
  <rect x="200" y="25" width="730" height="535" rx="8" fill="none" stroke="#dc2626" stroke-width="2"/>
  <!-- Cloudflare label on the border line with background -->
  <rect x="505" y="15" width="120" height="20" fill="url(#bgGradient)"/>
  <text x="565" y="30" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Cloudflare</text>
  
  <!-- ==================== FRONTEND ==================== -->
  <rect x="420" y="55" width="200" height="95" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Frontend label on the border line with background -->
  <rect x="480" y="45" width="80" height="20" fill="url(#bgGradient)"/>
  <text x="520" y="60" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Frontend</text>
  
  <rect x="450" y="80" width="140" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="520" y="99" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Custom Domain</text>
  
  <rect x="450" y="115" width="140" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="520" y="134" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Static App</text>
  
  <!-- Human in Loop -->
  <rect x="800" y="80" width="110" height="32" rx="4" fill="#1e3a5f" stroke="#F38020" stroke-width="1"/>
  <text x="855" y="100" fill="#F38020" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Human in Loop</text>
  
  <path d="M800 96 L620 96 L590 115" stroke="#F38020" stroke-width="1" fill="none" marker-end="url(#arrowOrange)"/>
  
  <!-- Arrow: Frontend to Backend -->
  <line x1="520" y1="150" x2="520" y2="175" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  
  <!-- ==================== BACKEND ==================== -->
  <rect x="280" y="165" width="480" height="145" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Backend label on the border line with background -->
  <rect x="480" y="155" width="80" height="20" fill="url(#bgGradient)"/>
  <text x="520" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Backend</text>
  
  <!-- Workers -->
  <rect x="450" y="190" width="140" height="36" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="520" y="213" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Workers</text>
  
  <!-- Data services row -->
  <rect x="300" y="245" width="80" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="340" y="264" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Vectorize</text>
  
  <rect x="390" y="245" width="50" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="415" y="264" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">R2</text>
  
  <!-- Intent handlers -->
  <rect x="520" y="245" width="70" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="555" y="264" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Chat</text>
  
  <rect x="600" y="245" width="70" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="635" y="264" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Image</text>
  
  <rect x="680" y="245" width="70" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="715" y="264" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Video</text>
  
  <!-- Arrows from Workers to services -->
  <path d="M480 226 L340 245" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <path d="M490 226 L415 245" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <path d="M540 226 L555 245" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <path d="M550 226 L635 245" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <path d="M560 226 L715 245" stroke="#94a3b8" stroke-width="1" fill="none"/>
  
  <!-- Arrow: Backend to AI Gateway -->
  <line x1="520" y1="310" x2="520" y2="335" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  
  <!-- ==================== AI GATEWAY (Central) ==================== -->
  <rect x="420" y="320" width="200" height="55" rx="6" fill="#F38020"/>
  <text x="520" y="352" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">AI Gateway</text>
  
  <!-- Arrow: AI Gateway splits to Workers AI and Replicate -->
  <path d="M470 375 L350 410" stroke="#ffffff" stroke-width="1.5" fill="none" marker-end="url(#arrowWhite)"/>
  <path d="M570 375 L690 410" stroke="#ffffff" stroke-width="1.5" fill="none" marker-end="url(#arrowWhite)"/>
  
  <!-- ==================== WORKERS AI (Left) ==================== -->
  <rect x="220" y="400" width="200" height="95" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Workers AI label on the border line with background -->
  <rect x="275" y="390" width="90" height="20" fill="url(#bgGradient)"/>
  <text x="320" y="405" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Workers AI</text>
  
  <rect x="240" y="425" width="80" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="280" y="444" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Qwen 3</text>
  
  <rect x="330" y="425" width="80" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="370" y="444" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Llama 3.3</text>
  
  <rect x="280" y="460" width="80" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="320" y="479" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Embeddings</text>
  
  <text x="320" y="505" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Chat + RAG</text>
  
  <!-- ==================== REPLICATE (Right) ==================== -->
  <rect x="620" y="400" width="200" height="95" rx="6" fill="none" stroke="#F38020" stroke-width="1.5"/>
  <!-- Replicate label on the border line with background -->
  <rect x="675" y="390" width="90" height="20" fill="url(#bgGradient)"/>
  <text x="720" y="405" fill="#F38020" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Replicate</text>
  
  <rect x="640" y="425" width="80" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="680" y="444" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">FLUX</text>
  
  <rect x="730" y="425" width="80" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="770" y="444" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Recraft</text>
  
  <rect x="640" y="460" width="80" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="680" y="479" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Kling</text>
  
  <rect x="730" y="460" width="80" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="770" y="479" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Wan</text>
  
  <text x="720" y="505" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Images + Videos</text>
  
  <!-- ==================== EXTERNAL DATA ==================== -->
  <rect x="20" y="165" width="150" height="145" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Data Sources label on the border line with background -->
  <rect x="35" y="155" width="100" height="20" fill="url(#bgGradient)"/>
  <text x="85" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Data Sources</text>
  
  <rect x="35" y="195" width="120" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="95" y="214" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">CF Docs</text>
  
  <rect x="35" y="230" width="120" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="95" y="249" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Developer Docs</text>
  
  <rect x="35" y="265" width="120" height="28" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="95" y="284" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">GitHub</text>
  
  <!-- Arrow: Data Sources to Vectorize -->
  <path d="M170 245 L300 259" stroke="#94a3b8" stroke-width="1" fill="none" marker-end="url(#arrowWhite)"/>
  <text x="220" y="240" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="8">RAG</text>
  
  <!-- ==================== OUTPUTS ==================== -->
  <rect x="420" y="520" width="200" height="30" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="520" y="540" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Response to User</text>
  
  <!-- Arrows: Workers AI and Replicate to Output -->
  <path d="M320 495 L480 520" stroke="#ffffff" stroke-width="1.5" fill="none" marker-end="url(#arrowWhite)"/>
  <path d="M720 495 L560 520" stroke="#ffffff" stroke-width="1.5" fill="none" marker-end="url(#arrowWhite)"/>
  
  <!-- Title at bottom -->
  <text x="475" y="570" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle" opacity="0.6">NexGen Agents Architecture</text>
  
</svg>
